<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Love Heart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui"></div>

<script>
const ui = document.getElementById("ui");

for(let i = 0; i < 200; i++){
  const t = (Math.PI * 2 * i) / 200;

  const x = 16 * Math.pow(Math.sin(t),3);
  const y = 
    13 * Math.cos(t) 
    - 5 * Math.cos(2*t)
    - 2 * Math.cos(3*t)
    - Math.cos(4*t);

  const span = document.createElement("span");
  span.className = "love";
  span.innerText = "I love you";

  span.style.left = 300 + x * 15 + "px";
  span.style.top = 300 - y * 15 + "px";

  ui.appendChild(span);
}
</script>

</body>
</html>
